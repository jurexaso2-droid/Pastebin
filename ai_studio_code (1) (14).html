<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastebin - Lookalike</title>
    <style>
        :root {
            --bg-color: #1c1e21;
            --header-bg: #24292e;
            --text-main: #e1e4e8;
            --accent: #2ea44f;
            --border: #30363d;
            --textarea-bg: #0d1117;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            background-color: var(--header-bg);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .controls {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background-color: var(--textarea-bg);
            color: #d1d5da;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 400px;
        }

        textarea:focus { border-color: var(--accent); }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background-color: #666; cursor: not-allowed; }

        /* Result Section */
        #result-container {
            margin-top: 20px;
            padding: 15px;
            background: #21262d;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: none;
        }

        .result-link {
            color: #58a6ff;
            word-break: break-all;
            text-decoration: none;
            font-family: monospace;
        }

        .copy-btn {
            background: #30363d;
            font-size: 12px;
            padding: 5px 10px;
            margin-left: 10px;
        }

        .status {
            font-size: 13px;
            margin-top: 5px;
            color: #8b949e;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">PASTE<span>BIN</span> CLONE</a>
    <div>GitHub Pages Edition</div>
</header>

<main>
    <div class="controls">
        <button id="submit-btn">Create New Paste</button>
    </div>

    <textarea id="paste-text" placeholder="Paste your text or code here..." spellcheck="false"></textarea>

    <div id="result-container">
        <strong>Paste Created!</strong>
        <div style="margin-top:10px; display:flex; align-items:center;">
            <a href="#" id="output-url" class="result-link" target="_blank"></a>
            <button class="copy-btn" id="copy-btn">Copy Link</button>
        </div>
        <p class="status">Paste stored via Shin-APIs</p>
    </div>
</main>

<script>
    const submitBtn = document.getElementById('submit-btn');
    const pasteText = document.getElementById('paste-text');
    const resultContainer = document.getElementById('result-container');
    const outputUrl = document.getElementById('output-url');
    const copyBtn = document.getElementById('copy-btn');

    submitBtn.addEventListener('click', async () => {
        const text = pasteText.value.trim();
        if (!text) {
            alert("Please enter some text first!");
            return;
        }

        // Disable button while loading
        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";

        try {
            const response = await fetch('https://shin-apis.gleeze.com/tools/pastebin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();

            if (data && data.answer) {
                resultContainer.style.display = 'block';
                outputUrl.href = data.answer;
                outputUrl.textContent = data.answer;
                // Scroll to result
                resultContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Failed to create paste. API returned an unexpected response.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("An error occurred while connecting to the API.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Create New Paste";
        }
    });

    copyBtn.addEventListener('click', () => {
        const url = outputUrl.textContent;
        navigator.clipboard.writeText(url).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "Copied!";
            setTimeout(() => copyBtn.textContent = originalText, 2000);
        });
    });
</script>

</body>
</html>
